<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>{{{ PRODUCT_NAME }}}</title>
    <style>
      /*
        Always renders the game in a portrait mobile aspect ratio, regardless of the
        device or browser window it's opened in -- on desktop this letterboxes/pillarboxes
        the canvas inside the browser window rather than stretching it to fill a wide
        landscape window; on phones it fills the screen because phone viewports are
        already close to this aspect ratio.
      */
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background: #000;
        overflow: hidden;
        touch-action: none; /* prevent the browser from scrolling/zooming on touch drags */
      }
      #unity-container {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #unity-canvas {
        background: {{{ BACKGROUND_FILENAME ? 'url(\'Build/' + BACKGROUND_FILENAME.replace(/'/g, '%27') + '\') center / cover' : BACKGROUND_COLOR }}};
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width={{{ WIDTH }}} height={{{ HEIGHT }}} tabindex="-1"></canvas>
    </div>
    <script src="Build/{{{ LOADER_FILENAME }}}"></script>
    <script>
      // Portrait aspect ratio to lock to, taken from the build's own declared canvas size
      // (Player Settings > Resolution and Presentation > Default Canvas Width/Height).
      var ASPECT_W = {{{ WIDTH }}};
      var ASPECT_H = {{{ HEIGHT }}};
      var canvas = document.querySelector("#unity-canvas");

      function resizeCanvasToAspectRatio() {
        var windowW = window.innerWidth;
        var windowH = window.innerHeight;
        var targetAspect = ASPECT_W / ASPECT_H;
        var windowAspect = windowW / windowH;

        var displayW, displayH;
        if (windowAspect > targetAspect) {
          // Window is relatively wider than the target portrait shape: fit to height, pillarbox sides.
          displayH = windowH;
          displayW = displayH * targetAspect;
        } else {
          // Window is relatively taller/narrower: fit to width, letterbox top/bottom.
          displayW = windowW;
          displayH = displayW / targetAspect;
        }

        canvas.style.width = displayW + "px";
        canvas.style.height = displayH + "px";
      }

      window.addEventListener("resize", resizeCanvasToAspectRatio);
      resizeCanvasToAspectRatio();

      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/{{{ DATA_FILENAME }}}",
        frameworkUrl: "Build/{{{ FRAMEWORK_FILENAME }}}",
#if USE_THREADS
        workerUrl: "Build/{{{ WORKER_FILENAME }}}",
#endif
#if USE_WASM
        codeUrl: "Build/{{{ CODE_FILENAME }}}",
#endif
#if SYMBOLS_FILENAME
        symbolsUrl: "Build/{{{ SYMBOLS_FILENAME }}}",
#endif
        streamingAssetsUrl: "StreamingAssets",
        companyName: {{{ JSON.stringify(COMPANY_NAME) }}},
        productName: {{{ JSON.stringify(PRODUCT_NAME) }}},
        productVersion: {{{ JSON.stringify(PRODUCT_VERSION) }}},
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
